<!DOCTYPE html>
<html lang="en">
<head>
    <title>DN form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
    <form action="">
        <ul>
            <li>
                <label class="label" for="name">Name: </label>
                <input class="input" type="text" id="name" name="name" placeholder="Enter Your Name" required pattern="[a-zA-Z]+\s+[a-zA-Z]+[a-zA-Z]" title="must be: FirstName Lastname"><br>
            </li>
            <li>
                <label class="label" for="email">Email: </label>
                <input class="input" type="text" id="email" name="email" placeholder="Enter Your Email" required pattern="[a-zA-Z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$" title="email must be in format characters@characters.domain"><br>
            </li>
            <li>
                <label class="label" for="card">Card:  </label>
                <input class="input" type="text" id="card" name="card" placeholder="Enter a Proxy Credit Card Number" required pattern="[0-9]{16}" title="Must contain 16 numbers"><br>
            </li>
            <input id="submit" type="submit">

    </ul>
    </form>
    </div>
</body>
</html>
